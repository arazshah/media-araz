services:
  media-nginx:
    image: nginx:alpine
    container_name: araz-media-nginx
    restart: unless-stopped
    volumes:
      - media_data:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: araz-filebrowser
    restart: unless-stopped
    command:
      - "--address=0.0.0.0"
      - "--port=8080"
      - "--root=/srv"
      - "--database=/database/filebrowser.db"
    volumes:
      - media_data:/srv
      - filebrowser_db:/database

volumes:
  media_data:
  filebrowser_db:
