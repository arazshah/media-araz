server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri =404;

        # CORS برای استفاده در LMS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, ETag" always;

        # برای ویدیو و seek کردن
        add_header Accept-Ranges bytes always;

        # کش مناسب برای فایل‌های آموزشی
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location ~* \.(mp4|m4v|webm|mov)$ {
        try_files $uri =404;

        types {
            video/mp4 mp4 m4v;
            video/webm webm;
            video/quicktime mov;
        }

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, ETag" always;
        add_header Accept-Ranges bytes always;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
